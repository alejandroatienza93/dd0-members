name: update members count

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python count_members.py
        env:
          WHOP_API_KEY: ${{ secrets.WHOP_API_KEY }}
      # Historial aplastado a propósito: un único commit siempre,
      # para no publicar la curva de crecimiento de miembros.
      - run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          git checkout --orphan tmp
          git add -A
          git commit -m "update count"
          git branch -M main
          git push -f origin main
